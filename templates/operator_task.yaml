semantic_op_id: "fill-me"
ptx_semantics: "fill-me"
baseline_source: "user_input"
user_baseline_metric: "fill-me"
operator_seed_path: "fill-me"
iteration_limit: "5"
operator_correctness_entry: "echo 'replace with operator correctness command'"
operator_benchmark_entry: "echo 'replace with operator benchmark command'"
operator_targeted_profile_entry: "cd tf_test_model/prunedGraph && msys profile --duration 120 -t musa -o msys_targeted python run_graph_tf_musa.py --inference-only --musa-plugin ../tensorflow_musa_extension/build/libmusa_plugin.so"
operator_full_profile_entry: "cd tf_test_model/prunedGraph && msys profile --duration 120 -t musa -o msys_full python run_graph_tf_musa.py --inference-only --musa-plugin ../tensorflow_musa_extension/build/libmusa_plugin.so"
operator_msys_export_entry: "cd tf_test_model/prunedGraph && OUT=README_MSYS_STATS_$(date +%Y%m%d_%H%M%S).md && { echo '# MSYS Profiling Report'; echo; echo \"- Generated at: $(date '+%Y-%m-%d %H:%M:%S')\"; echo '- Report file: msys_full.msys-rep'; echo; echo '## 1) gpu_engine_time_sum'; echo; msys stats -r gpu_engine_time_sum msys_full.msys-rep | sed 's/^/    /'; echo; echo '## 2) musa_kern_exec_sum'; echo; msys stats -r musa_kern_exec_sum msys_full.msys-rep | sed 's/^/    /'; echo; echo '## 3) musa_gpu_kern_sum'; echo; msys stats -r musa_gpu_kern_sum msys_full.msys-rep | sed 's/^/    /'; } > \"$OUT\" && echo \"Generated: $(pwd)/$OUT\""
